name: CI/CD Deployment

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    # Backend Build
    - name: Install & Build Backend
      run: |
        cd backend
        npm install
        npm run build

    # Frontend Build
    - name: Install & Build Frontend
      run: |
        cd frontend
        npm install
        npm run build

    # Deployment Step (Template)
    # This step requires SSH secrets to be set in GitHub Repository Secrets
    - name: Deploy to EC2
      if: false # Set to true when secrets are configured
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/app
          git pull origin main
          
          # Restart Backend
          cd backend
          npm install
          npm run build
          pm2 restart collab-backend || pm2 start dist/server.js --name collab-backend
          
          # Setup Frontend (Copy to Nginx folder)
          cd ../frontend
          npm install
          npm run build
          sudo cp -r dist/* /var/www/html/
          sudo systemctl restart nginx
